<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="color-scheme" content="light dark" />
<title>Orbital · Hoje</title>
<style>
  :root{
    --bg:#f4f5f7; --card:#ffffff; --ink:#1a1c20; --muted:#6b7280; --line:#e5e7eb;
    --red:#dc2626; --red-bg:#fee2e2; --redk:#991b1b;
    --yellow:#b45309; --yellow-bg:#fef3c7;
    --orange:#c2410c; --orange-bg:#ffedd5;
    --purple:#6d28d9; --purple-bg:#ede9fe;
    --green:#15803d; --accent:#2563eb;
    --radius:14px; --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#0f1115; --card:#181b21; --ink:#e9ecf1; --muted:#9aa3b2; --line:#2a2f3a;
      --red-bg:#3b1417; --yellow-bg:#3a2e0c; --orange-bg:#3a1f0c; --purple-bg:#241a3d; }
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;padding:env(safe-area-inset-top) 0 40px;}
  .wrap{max-width:1040px;margin:0 auto;padding:16px;}
  #gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;}
  #gate[hidden]{display:none!important}
  #app[hidden]{display:none!important}
  #gate .box{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;max-width:380px;width:100%;}
  #gate h2{margin:0 0 6px;font-size:18px}
  #gate p{margin:0 0 14px;color:var(--muted);font-size:13px}
  #gate input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;background:transparent;color:var(--ink);font-size:14px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  #gate button,.btn{margin-top:12px;width:100%;padding:11px;border:0;border-radius:10px;background:var(--accent);color:#fff;font-size:14px;font-weight:600;cursor:pointer}
  #gate .err{color:var(--red);font-size:12px;margin-top:8px;min-height:14px}
  header.top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px}
  header.top h1{margin:0;font-size:22px;font-weight:700;letter-spacing:-.01em}
  .state{color:var(--muted);font-size:13.5px;margin-top:3px;max-width:70ch}
  .meta{display:flex;align-items:center;gap:8px;flex-shrink:0}
  .updated{color:var(--muted);font-size:11.5px;text-align:right}
  .refresh{border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:9px;padding:7px 9px;cursor:pointer;font-size:13px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px 16px;margin-bottom:12px}
  .card h2{margin:0 0 10px;font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:8px}
  .badge{font-size:11px;font-weight:700;padding:2px 7px;border-radius:20px;background:var(--line);color:var(--ink)}
  .focus{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .focus .f{background:linear-gradient(180deg,transparent,rgba(37,99,235,.04));border:1px solid var(--line);border-radius:12px;padding:12px;font-size:14.5px;font-weight:600;display:flex;gap:9px}
  .focus .n{color:var(--accent);font-weight:800}
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:start}
  .days{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .day h3{margin:0 0 6px;font-size:11.5px;font-weight:700;color:var(--muted)}
  .ev{border-left:3px solid var(--accent);background:rgba(37,99,235,.05);padding:7px 9px;border-radius:0 8px 8px 0;margin-bottom:6px}
  .ev .t{font-weight:700;font-size:12.5px;color:var(--muted)}
  .ev .ti{font-size:13.5px;font-weight:600}
  .ev .p{font-size:11.5px;color:var(--muted)}
  .ev .flag{margin-top:4px;font-size:11.5px;font-weight:700;color:var(--red);background:var(--red-bg);padding:2px 6px;border-radius:6px;display:inline-block}
  .empty{color:var(--muted);font-size:12.5px;font-style:italic;padding:6px 0}
  .tk{padding:8px 0;border-bottom:1px solid var(--line)}
  .tk:last-child{border:0}
  .tk .lab{font-size:10.5px;font-weight:800;padding:1px 6px;border-radius:5px;margin-right:7px;text-transform:uppercase}
  .lab.p1{background:var(--red-bg);color:var(--red)}
  .lab.over{background:var(--red-bg);color:var(--redk)}
  .lab.fu{background:var(--orange-bg);color:var(--orange)}
  .tk .sub{color:var(--muted);font-size:12px;margin-top:2px}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
  .chip{background:var(--purple-bg);color:var(--purple);font-size:12px;font-weight:600;padding:3px 9px;border-radius:20px}
  .dmeta{color:var(--muted);font-size:12.5px}
  .sig{display:flex;flex-wrap:wrap;gap:18px;color:var(--muted);font-size:13px}
  .sig b{color:var(--ink);font-size:16px;font-weight:800;margin-right:4px}
  details.raw{margin-top:6px}
  details.raw summary{cursor:pointer;color:var(--accent);font-size:12.5px}
  details.raw pre{white-space:pre-wrap;font:12.5px/1.5 ui-monospace,Menlo,monospace;background:var(--bg);padding:10px;border-radius:8px;margin-top:6px}
  .err-banner{background:var(--red-bg);color:var(--red);padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:12px}
  .row{padding:8px 0;border-bottom:1px solid var(--line)}
  .row:last-child{border:0}
  .row .ti{font-weight:600;font-size:14px}
  .row .why{color:var(--muted);font-size:12.5px;margin-top:2px}
  .row .who{font-size:11px;font-weight:700;color:var(--accent);background:rgba(37,99,235,.08);padding:1px 6px;border-radius:5px;margin-left:6px}
  .dot{font-size:10px;margin-right:6px;vertical-align:middle}
  a.lnk{color:var(--accent);text-decoration:none}
  a.lnk:hover{text-decoration:underline}
  a.evlnk{color:inherit;text-decoration:none}
  a.evlnk:hover{text-decoration:underline}
  .lane{margin:0 0 14px}
  .lane:last-child{margin-bottom:0}
  .lane-h{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;margin:0 0 6px;display:flex;align-items:center;gap:6px}
  .inbox-sum{font-size:12px;color:var(--muted);margin:-2px 0 12px;display:flex;flex-wrap:wrap;gap:10px}
  .rest{color:var(--muted);font-size:12.5px;font-style:italic;padding-top:8px;border-top:1px solid var(--line);margin-top:4px}
  /* email row */
  .mail{padding:9px 0 9px 10px;border-left:2px solid var(--line);margin-bottom:2px}
  .mail+.mail{border-top:1px solid var(--line)}
  .mail-top{display:flex;align-items:center;gap:7px;margin-bottom:3px}
  .who-tag{font-size:11px;font-weight:700;color:#475569;background:rgba(100,116,139,.13);padding:1px 8px;border-radius:6px;white-space:nowrap}
  @media (prefers-color-scheme:dark){.who-tag{color:#cbd5e1;background:rgba(148,163,184,.16)}}
  .topic-tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;color:var(--purple);background:var(--purple-bg);padding:1px 7px;border-radius:6px}
  .mail .age{margin-left:auto;font-size:11px;color:var(--muted);white-space:nowrap}
  .mail .nudge{font-size:10px;font-weight:800;color:var(--orange);background:var(--orange-bg);padding:1px 7px;border-radius:6px}
  .mail-act{font-size:14px;color:var(--ink);font-weight:600;line-height:1.35;margin:1px 0}
  .mail-subj{display:block;font-size:12px;color:var(--muted);text-decoration:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
  .mail-subj:hover{color:var(--accent);text-decoration:underline}
  .mail-subj.main{color:var(--ink);font-size:13.5px;font-weight:600;white-space:normal}
  .mail-subj.main:hover{color:var(--accent)}
  /* tabs */
  .tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;border-bottom:1px solid var(--line);padding-bottom:10px}
  .tab-btn{border:1px solid var(--line);background:var(--card);color:var(--muted);font-size:12.5px;font-weight:600;padding:6px 12px;border-radius:20px;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
  .tab-btn b{font-weight:800;color:var(--ink)}
  .tab-btn.active{background:var(--ink);color:var(--card);border-color:var(--ink)}
  .tab-btn.active b{color:var(--card)}
  .tab-panel[hidden]{display:none}
  /* collapse */
  .card-h{cursor:pointer;user-select:none}
  .caret{display:inline-block;color:var(--muted);font-size:10px;transition:transform .15s;margin-right:2px}
  .card:not(.collapsed) .caret{transform:rotate(90deg)}
  .card.collapsed .card-body{display:none}
  /* modal */
  #modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:60;padding:18px}
  #modal[hidden]{display:none!important}
  .modal-box{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:0 10px 40px rgba(0,0,0,.3);max-width:680px;width:100%;max-height:85vh;display:flex;flex-direction:column}
  .modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--line)}
  .modal-head button{border:0;background:transparent;color:var(--muted);font-size:18px;cursor:pointer;padding:4px 8px}
  #modalBody{margin:0;padding:16px;overflow:auto;white-space:pre-wrap;font:13px/1.55 ui-monospace,Menlo,monospace}
  @media (max-width:720px){
    .focus{grid-template-columns:1fr}
    .cols{grid-template-columns:1fr}
    .days{grid-template-columns:1fr}
    header.top h1{font-size:19px}
  }
</style>
</head>
<body>
<div id="gate" hidden>
  <div class="box">
    <h2>☀️ Orbital · Hoje</h2>
    <p>Cole o token de acesso (X-Orbital-Token). Fica salvo só neste aparelho.</p>
    <input id="tok" type="password" placeholder="token…" autocomplete="off" />
    <button id="btnEnter" type="button">Entrar</button>
    <div class="err" id="gateErr"></div>
  </div>
</div>

<div class="wrap" id="app" hidden>
  <header class="top">
    <div>
      <h1 id="dateLabel">Carregando…</h1>
      <div class="state" id="stateLine"></div>
    </div>
    <div class="meta">
      <div class="updated" id="updated"></div>
      <button class="refresh" id="btnBrief" type="button" title="Brief completo">📄 Brief</button>
      <button class="refresh" id="btnRefresh" type="button" title="Atualizar">⟳</button>
    </div>
  </header>
  <div id="content"></div>
</div>

<div id="modal" hidden>
  <div class="modal-box">
    <div class="modal-head"><strong>📄 Brief completo</strong><button id="btnCloseModal" type="button">✕</button></div>
    <pre id="modalBody"></pre>
  </div>
</div>

<script>
(function(){
  "use strict";
  var API="https://inspiragoglobal.com.br/api/orbital/all";
  var LS="orbital_token";
  function $(id){return document.getElementById(id);}
  function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c];});}
  // Remove invisíveis/não-ASCII que vêm do copiar-colar (NBSP, zero-width, aspas curvas, \n) — senão o fetch rejeita o header.
  function clean(s){return String(s==null?"":s).normalize("NFKC").replace(/[^\x21-\x7E]/g,"");}

  function getTok(){ try{return localStorage.getItem(LS);}catch(e){return window.__tok||null;} }
  function setTok(v){ try{localStorage.setItem(LS,v);}catch(e){window.__tok=v;} }
  function clrTok(){ try{localStorage.removeItem(LS);}catch(e){} window.__tok=null; }

  function ago(iso){
    if(!iso) return "";
    var d=(Date.now()-new Date(iso).getTime())/1000;
    if(d<90) return "agora";
    if(d<5400) return "há "+Math.round(d/60)+" min";
    if(d<172800) return "há "+Math.round(d/3600)+" h";
    return "há "+Math.round(d/86400)+" d";
  }

  function showGate(msg){
    $("app").hidden=true; $("gate").hidden=false;
    if(msg) $("gateErr").textContent=msg;
    try{$("tok").focus();}catch(e){}
  }

  function submitToken(){
    var v=clean($("tok").value);
    if(!v){ $("gateErr").textContent="Cole o token."; return; }
    setTok(v);
    $("gate").hidden=true;
    load();
  }

  function load(){
    var tok=getTok();
    if(!tok){ showGate(); return; }
    $("app").hidden=false;
    $("content").innerHTML='<div class="empty">Carregando…</div>';
    fetch(API,{headers:{"X-Orbital-Token":clean(tok)}})
      .then(function(r){
        if(r.status===401){ clrTok(); showGate("Token inválido. Tente de novo."); return null; }
        if(!r.ok) throw new Error("HTTP "+r.status);
        return r.json();
      })
      .then(function(j){ if(j) render(j.snapshot||{}); })
      .catch(function(e){
        $("content").innerHTML='<div class="err-banner">Falha ao carregar: '+esc(e.message)+'. Toque em ⟳.</div>';
      });
  }

  var collapsed={};
  try{ collapsed=JSON.parse(localStorage.getItem("orbital_collapsed")||"{}"); }catch(e){}
  function slug(s){return String(s).replace(/[^\w]+/g,"-").toLowerCase();}
  function card(title,right,body){
    var k=slug(title), cl=collapsed[k]?" collapsed":"";
    return '<div class="card'+cl+'" data-key="'+k+'"><h2 class="card-h"><span class="caret">▸</span>'+title+(right?'<span style="margin-left:auto">'+right+'</span>':'')+'</h2><div class="card-body">'+body+'</div></div>';
  }

  var lastBrief="", activeTab=null;
  try{ activeTab=localStorage.getItem("orbital_tab"); }catch(e){}
  function linkify(text,url){ return url?('<a class="lnk" href="'+esc(url)+'" target="_blank" rel="noopener">'+text+'</a>'):text; }
  function mailTags(who,topic){ return '<span class="who-tag">'+esc(who||"")+'</span>'+(topic?'<span class="topic-tag">'+esc(topic)+'</span>':''); }
  function mailSubj(x,main){ var t=esc(x.subject||""); return x.link?'<a class="mail-subj'+(main?' main':'')+'" href="'+esc(x.link)+'" target="_blank" rel="noopener">'+t+'</a>':'<span class="mail-subj'+(main?' main':'')+'">'+t+'</span>'; }

  function render(s){
    var b=(s.briefing&&s.briefing.data)||{}, t=(s.tasks&&s.tasks.data)||{},
        d=(s.digest&&s.digest.data)||{}, sig=(s.signals&&s.signals.data)||{};
    $("dateLabel").textContent="☀️ "+(b.date_label||"Hoje");
    $("stateLine").textContent=b.state_line||"";
    $("updated").textContent=(s.briefing&&s.briefing.createdAt)?("atualizado "+ago(s.briefing.createdAt)):"";
    lastBrief=b.summary_md||"";
    $("btnBrief").style.display=lastBrief?"":"none";
    var h="";

    if(Array.isArray(b.focus_today)&&b.focus_today.length){
      var nU=(b.urgent||[]).length, nD=(b.decisions||[]).length;
      var badges=(nU?'<span class="badge" style="background:var(--red-bg);color:var(--red)">🔴 '+nU+'</span> ':'')+
                 (nD?'<span class="badge" style="background:var(--yellow-bg);color:var(--yellow)">🟡 '+nD+'</span>':'');
      h+=card("🎯 Foco do dia",badges,
        '<div class="focus">'+b.focus_today.map(function(f,i){return '<div class="f"><span class="n">'+(i+1)+'</span><span>'+esc(f)+'</span></div>';}).join("")+'</div>');
    }

    // 📥 Central — uma caixa com abas (Urgente / Decisões / Cobrar / Caixa)
    var tabs=[];
    if(Array.isArray(b.urgent)&&b.urgent.length){
      tabs.push({key:"urgente",label:"🔴 Urgente",n:b.urgent.length,html:
        b.urgent.map(function(x){
          var who=x.who?'<span class="who">'+esc(x.who)+'</span>':'';
          return '<div class="row"><div class="ti">'+linkify(esc(x.title||""),x.link)+who+'</div>'+(x.why?'<div class="why">'+esc(x.why)+'</div>':'')+'</div>';
        }).join("")});
    }
    if(Array.isArray(b.decisions)&&b.decisions.length){
      tabs.push({key:"decisoes",label:"🟡 Decisões",n:b.decisions.length,html:
        b.decisions.map(function(x){
          return '<div class="row"><div class="ti">'+linkify(esc(x.title||""),x.link)+'</div>'+(x.note?'<div class="why">'+esc(x.note)+'</div>':'')+'</div>';
        }).join("")});
    }
    var ib=b.inbox||null;
    if(ib&&(ib.waiting||[]).length){
      tabs.push({key:"cobrar",label:"⏳ Cobrar",n:ib.waiting.length,html:
        ib.waiting.map(function(x){
          var meta=(x.sent_days!=null?'<span class="age">há '+esc(x.sent_days)+'d</span>':'')+(x.nudge?'<span class="nudge">cobrar</span>':'');
          return '<div class="mail"><div class="mail-top">'+mailTags("p/ "+(x.to||""),x.topic)+meta+'</div>'+mailSubj(x,true)+'</div>';
        }).join("")});
    }
    if(ib){
      var nr=(ib.respond||[]).length, nu=(ib.unread||[]).length, cbody="";
      if(nr){ cbody+='<div class="lane"><div class="lane-h" style="color:var(--red)">🔴 Sua vez — responder</div>'+
        ib.respond.map(function(x){
          return '<div class="mail"><div class="mail-top">'+mailTags(x.from,x.topic)+(x.age?'<span class="age">'+esc(x.age)+'</span>':'')+'</div>'+
            (x.action?'<div class="mail-act">'+esc(x.action)+'</div>':'')+mailSubj(x,!x.action)+'</div>';
        }).join("")+'</div>'; }
      if(nu){ cbody+='<div class="lane"><div class="lane-h" style="color:var(--muted)">📬 Não lidas relevantes</div>'+
        ib.unread.map(function(x){ return '<div class="mail"><div class="mail-top">'+mailTags(x.from,x.topic)+'</div>'+mailSubj(x,true)+'</div>'; }).join("")+'</div>'; }
      if(ib.rest_count) cbody+='<div class="rest">⚪ resto: '+esc(ib.rest_count)+' (FYI / ruído)</div>';
      if(nr||nu||ib.rest_count) tabs.push({key:"caixa",label:"📧 Caixa",n:(nr+nu)||null,html:cbody});
    } else if(Array.isArray(b.email)&&b.email.length){
      tabs.push({key:"caixa",label:"📧 Email",n:b.email.length,html:
        b.email.map(function(x){ var dotc=x.level==="red"?"🔴":(x.level==="yellow"?"🟡":"⚪");
          return '<div class="row"><div class="ti">'+linkify('<span class="dot">'+dotc+'</span>'+(x.from?'<b>'+esc(x.from)+'</b> — ':'')+esc(x.subject||""),x.link)+'</div>'+(x.action?'<div class="why">'+esc(x.action)+'</div>':'')+'</div>'; }).join("")});
    }
    if(tabs.length){
      var act=activeTab&&tabs.some(function(tb){return tb.key===activeTab;})?activeTab:tabs[0].key;
      var bar=tabs.map(function(tb){ return '<button class="tab-btn'+(tb.key===act?" active":"")+'" data-tab="'+tb.key+'">'+tb.label+(tb.n!=null?' <b>'+tb.n+'</b>':'')+'</button>'; }).join("");
      var panels=tabs.map(function(tb){ return '<div class="tab-panel" data-panel="'+tb.key+'"'+(tb.key===act?"":" hidden")+'>'+tb.html+'</div>'; }).join("");
      h+=card("📥 Central","",'<div class="tabs">'+bar+'</div>'+panels);
    }

    h+='<div class="cols">';
    var ag;
    if(Array.isArray(b.calendar)&&b.calendar.length){
      ag='<div class="days">'+b.calendar.map(function(day){
        var evs=day.events||[];
        var inner=evs.length? evs.map(function(e){
          var ti=e.link?('<a class="evlnk" href="'+esc(e.link)+'" target="_blank" rel="noopener">'+esc(e.title||"")+'</a>'):esc(e.title||"");
          return '<div class="ev"><div class="t">'+esc(e.time||"")+'</div><div class="ti">'+ti+'</div>'+
            ((e.participants&&e.participants.length)?'<div class="p">'+esc(e.participants.join(", "))+'</div>':'')+
            ((e.flags&&e.flags.length)?e.flags.map(function(f){return '<div class="flag">⚠️ '+esc(f)+'</div>';}).join(""):'')+'</div>';
        }).join("") : '<div class="empty">livre</div>';
        return '<div class="day"><h3>'+esc(day.label||day.date||"")+'</h3>'+inner+'</div>';
      }).join("")+'</div>';
    } else ag='<div class="empty">Sem agenda.</div>';
    h+=card("📅 Agenda · 3 dias","",ag);

    var tk="";
    (t.p1||[]).forEach(function(x){tk+='<div class="tk"><span class="lab p1">P1</span>'+linkify(esc(x.title),x.link)+(x.due?'<div class="sub">vence '+esc(x.due)+'</div>':'')+'</div>';});
    (t.overdue||[]).forEach(function(x){tk+='<div class="tk"><span class="lab over">overdue</span>'+linkify(esc(x.title),x.link)+(x.since?'<div class="sub">desde '+esc(x.since)+'</div>':'')+'</div>';});
    (t.cold_followups||[]).forEach(function(x){tk+='<div class="tk"><span class="lab fu">followup '+(x.days!=null?x.days+"d":"")+'</span>'+linkify(esc(x.name),x.link)+(x.context?'<div class="sub">'+esc(x.context)+'</div>':'')+'</div>';});
    if(!tk) tk='<div class="empty">Nada pendente.</div>';
    h+=card("📋 Tasks","",tk);
    h+='</div>';

    if(d.new_pages||d.new_decisions!=null||d.meetings!=null){
      var chips=(d.new_pages||[]).map(function(p){
        var name=(typeof p==="string")?p:(p.title||p.name||""); var lnk=(p&&typeof p==="object")?p.link:null;
        return lnk?('<a class="chip" style="text-decoration:none" href="'+esc(lnk)+'" target="_blank" rel="noopener">+ '+esc(name)+'</a>'):('<span class="chip">+ '+esc(name)+'</span>');
      }).join("");
      h+=card("🧠 O cérebro aprendeu",d.since?'<span class="badge">desde '+esc(d.since)+'</span>':'',
        (chips?'<div class="chips">'+chips+'</div>':'')+
        '<div class="dmeta">'+(d.new_decisions!=null?d.new_decisions+" decisões · ":"")+(d.meetings!=null?d.meetings+" reuniões ingeridas":"")+'</div>');
    }

    var sg=[];
    if(sig.open_p1!=null) sg.push('<span><b>'+sig.open_p1+'</b>P1 abertos</span>');
    if(sig.cold_followups!=null) sg.push('<span><b>'+sig.cold_followups+'</b>followups frios</span>');
    if(sig.wiki_pages!=null) sg.push('<span><b>'+sig.wiki_pages+'</b>páginas wiki</span>');
    if(sig.decisions!=null) sg.push('<span><b>'+sig.decisions+'</b>decisões</span>');
    if(sg.length) h+=card("📊 Métricas","",'<div class="sig">'+sg.join("")+'</div>');

    $("content").innerHTML=h||'<div class="empty">Sem dados ainda. A rotina matinal popula isto.</div>';
  }

  $("content").addEventListener("click",function(e){
    // troca de aba
    var tb=e.target.closest&&e.target.closest(".tab-btn");
    if(tb){
      var key=tb.getAttribute("data-tab"), wrap=tb.closest(".card-body");
      [].forEach.call(wrap.querySelectorAll(".tab-btn"),function(b){ b.classList.toggle("active",b===tb); });
      [].forEach.call(wrap.querySelectorAll(".tab-panel"),function(p){ p.hidden=(p.getAttribute("data-panel")!==key); });
      activeTab=key; try{ localStorage.setItem("orbital_tab",key); }catch(err){}
      return;
    }
    // colapsar card
    var hd=e.target.closest&&e.target.closest(".card-h");
    if(!hd) return;
    if(e.target.closest("a")) return;
    var c=hd.parentNode, k=c.getAttribute("data-key");
    c.classList.toggle("collapsed");
    collapsed[k]=c.classList.contains("collapsed");
    try{ localStorage.setItem("orbital_collapsed",JSON.stringify(collapsed)); }catch(e){}
  });
  $("btnBrief").addEventListener("click",function(){ $("modalBody").textContent=lastBrief||"(sem brief)"; $("modal").hidden=false; });
  $("btnCloseModal").addEventListener("click",function(){ $("modal").hidden=true; });
  $("modal").addEventListener("click",function(e){ if(e.target===$("modal")) $("modal").hidden=true; });
  $("btnEnter").addEventListener("click",submitToken);
  $("tok").addEventListener("keydown",function(e){ if(e.key==="Enter") submitToken(); });
  $("btnRefresh").addEventListener("click",load);
  load();
})();
</script>
</body>
</html>
