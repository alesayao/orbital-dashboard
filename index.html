<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="color-scheme" content="light dark" />
<title>Orbital · Hoje</title>
<style>
  :root{
    --bg:#f2f2f7; --card:#ffffff; --ink:#1c1c1e; --muted:#8e8e93; --line:rgba(60,60,67,.13);
    --red:#dc2626; --red-bg:#fee2e2; --redk:#991b1b;
    --yellow:#b45309; --yellow-bg:#fef3c7;
    --orange:#c2410c; --orange-bg:#ffedd5;
    --purple:#6d28d9; --purple-bg:#ede9fe;
    --green:#15803d; --accent:#007aff;
    --radius:18px; --shadow:0 1px 2px rgba(0,0,0,.04),0 6px 18px rgba(0,0,0,.05);
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#000000; --card:#1c1c1e; --ink:#f2f2f7; --muted:#98989f; --line:rgba(120,120,128,.32);
      --accent:#0a84ff; --red-bg:#3b1417; --yellow-bg:#3a2e0c; --orange-bg:#3a1f0c; --purple-bg:#241a3d;
      --shadow:0 1px 2px rgba(0,0,0,.5),0 6px 20px rgba(0,0,0,.55); }
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;padding:env(safe-area-inset-top) 0 40px;}
  .wrap{max-width:1040px;margin:0 auto;padding:16px;}
  #gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;}
  #gate[hidden]{display:none!important}
  #app[hidden]{display:none!important}
  #gate .box{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;max-width:380px;width:100%;}
  #gate h2{margin:0 0 6px;font-size:18px}
  #gate p{margin:0 0 14px;color:var(--muted);font-size:13px}
  #gate input{width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:12px;background:var(--bg);color:var(--ink);font-size:14px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
  #gate input:focus{outline:none;border-color:var(--accent)}
  #gate button,.btn{margin-top:12px;width:100%;padding:12px;border:0;border-radius:12px;background:var(--accent);color:#fff;font-size:15px;font-weight:600;cursor:pointer}
  #gate button:active,.btn:active{transform:scale(.98)}
  #gate .err{color:var(--red);font-size:12px;margin-top:8px;min-height:14px}
  header.top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px}
  header.top h1{margin:0;font-size:22px;font-weight:700;letter-spacing:-.01em}
  .state{color:var(--muted);font-size:13.5px;margin-top:3px;max-width:70ch}
  .meta{display:flex;align-items:center;gap:8px;flex-shrink:0}
  .updated{color:var(--muted);font-size:11.5px;text-align:right}
  .refresh{border:0;background:rgba(120,120,128,.16);color:var(--ink);border-radius:20px;padding:7px 13px;cursor:pointer;font-size:13px;font-weight:600;transition:background .15s,transform .1s}
  .refresh:hover{background:rgba(120,120,128,.26)}
  .refresh:active{transform:scale(.95)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:15px 17px;margin-bottom:12px}
  .card h2{margin:0 0 10px;font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:8px}
  .badge{font-size:11px;font-weight:700;padding:2px 7px;border-radius:20px;background:var(--line);color:var(--ink)}
  .focus{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .focus .f{background:var(--bg);border:1px solid var(--line);border-radius:14px;padding:12px 13px;font-size:14px;font-weight:500;line-height:1.4;display:flex;gap:9px}
  .focus .n{color:var(--accent);font-weight:800}
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:start}
  .days{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
  .day{min-width:0}
  .day h3{margin:0 0 6px;font-size:11.5px;font-weight:700;color:var(--muted)}
  .ev{border-left:3px solid var(--accent);background:rgba(0,122,255,.06);padding:7px 9px;border-radius:0 8px 8px 0;margin-bottom:6px}
  .ev .t{font-weight:700;font-size:12.5px;color:var(--muted)}
  .ev .ti{font-size:13.5px;font-weight:600}
  .ev .p{font-size:11.5px;color:var(--muted)}
  .ev .flag{margin-top:4px;font-size:11.5px;font-weight:700;color:var(--red);background:var(--red-bg);padding:2px 6px;border-radius:6px;display:inline-block}
  /* agenda v2 — altura ∝ duração */
  .ev2{border-left:3px solid var(--accent);background:rgba(0,122,255,.07);padding:5px 9px;border-radius:0 8px 8px 0;margin-bottom:4px;display:flex;flex-direction:column;gap:1px}
  .ev2 .flag{white-space:normal}
  .ev2-t{font-size:11px;font-weight:700;color:var(--muted);white-space:nowrap}
  .ev2-ti{font-size:13px;font-weight:600;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ev2 .p{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ev2 .flag{margin-top:2px;font-size:11px;font-weight:600;color:var(--muted);background:rgba(100,116,139,.12);padding:1px 6px;border-radius:6px;display:inline-block;align-self:flex-start}
  .ev2 .flag.hot{font-weight:700;color:var(--red);background:var(--red-bg)}
  .ev2.past{opacity:.45}
  .nowline{border-top:2px solid var(--accent);position:relative;margin:8px 0 6px}
  .nowline::before{content:"agora";position:absolute;top:-8px;left:0;font-size:9px;font-weight:800;color:var(--accent);background:var(--card);padding-right:5px;text-transform:uppercase;letter-spacing:.05em}
  /* ⏰ AGORA strip */
  .now-strip{background:var(--ink);color:var(--card);border-radius:var(--radius);padding:13px 16px;margin-bottom:12px;display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;box-shadow:var(--shadow)}
  .now-strip .k{font-size:10.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;opacity:.65}
  .now-strip .main{font-size:15.5px;font-weight:700;flex:1 1 240px;min-width:0;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .now-strip .cd{font-size:12.5px;font-weight:800;background:rgba(255,255,255,.16);padding:2px 10px;border-radius:20px;white-space:nowrap}
  .now-strip .cd.done-cd{background:rgba(74,222,128,.28)}
  .now-strip .sub{font-size:12.5px;opacity:.78;width:100%}
  /* check de conclusão (dopamina, local) */
  .chk{width:16px;height:16px;min-width:16px;border:1.5px solid var(--muted);border-radius:5px;display:inline-block;vertical-align:-3px;margin-right:8px;cursor:pointer;flex-shrink:0}
  .chk:hover{border-color:var(--green)}
  .done-item{opacity:.5}
  .done-item .chk{background:var(--green);border-color:var(--green)}
  .done-item .chk::after{content:"✓";color:#fff;font-size:11px;font-weight:800;display:block;text-align:center;line-height:14px}
  .tk.done-item{text-decoration:line-through}
  .f.done-item span:last-child{text-decoration:line-through}
  .free{font-size:10.5px;color:var(--green);background:rgba(21,128,61,.05);border:1px dashed rgba(21,128,61,.35);border-radius:6px;text-align:center;padding:2px 0;margin-bottom:4px}
  .freeday{color:var(--green);font-size:12.5px;font-style:italic;padding:6px 0}
  .empty{color:var(--muted);font-size:12.5px;font-style:italic;padding:6px 0}
  .tk{padding:8px 0;border-bottom:1px solid var(--line)}
  .tk:last-child{border:0}
  .tk .lab{font-size:10.5px;font-weight:800;padding:1px 6px;border-radius:5px;margin-right:7px;text-transform:uppercase}
  .lab.p1{background:var(--red-bg);color:var(--red)}
  .lab.over{background:var(--red-bg);color:var(--redk)}
  .lab.fu{background:var(--orange-bg);color:var(--orange)}
  .tk .sub{color:var(--muted);font-size:12px;margin-top:2px}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
  .chip{background:var(--purple-bg);color:var(--purple);font-size:12px;font-weight:600;padding:3px 9px;border-radius:20px}
  .dmeta{color:var(--muted);font-size:12.5px}
  .sig{display:flex;flex-wrap:wrap;gap:18px;color:var(--muted);font-size:13px}
  .sig b{color:var(--ink);font-size:16px;font-weight:800;margin-right:4px}
  details.raw{margin-top:6px}
  details.raw summary{cursor:pointer;color:var(--accent);font-size:12.5px}
  details.raw pre{white-space:pre-wrap;font:12.5px/1.5 ui-monospace,Menlo,monospace;background:var(--bg);padding:10px;border-radius:8px;margin-top:6px}
  .err-banner{background:var(--red-bg);color:var(--red);padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:12px}
  .row{padding:8px 0;border-bottom:1px solid var(--line)}
  .row:last-child{border:0}
  .row .ti{font-weight:600;font-size:14px}
  .row .why{color:var(--muted);font-size:12.5px;margin-top:2px}
  .row .who{font-size:11.5px;font-weight:500;color:var(--muted);background:transparent;padding:0;margin-left:8px}
  .row .who::before{content:"· ";opacity:.6}
  .dot{font-size:10px;margin-right:6px;vertical-align:middle}
  a.lnk{color:var(--accent);text-decoration:none}
  a.lnk:hover{text-decoration:underline}
  a.evlnk{color:inherit;text-decoration:none}
  a.evlnk:hover{text-decoration:underline}
  .lane{margin:0 0 14px}
  .lane:last-child{margin-bottom:0}
  .lane-h{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;margin:0 0 6px;display:flex;align-items:center;gap:6px}
  .inbox-sum{font-size:12px;color:var(--muted);margin:-2px 0 12px;display:flex;flex-wrap:wrap;gap:10px}
  .rest{color:var(--muted);font-size:12.5px;font-style:italic;padding-top:8px;border-top:1px solid var(--line);margin-top:4px}
  /* email row */
  .mail{padding:9px 0 9px 10px;border-left:2px solid var(--line);margin-bottom:2px}
  .mail+.mail{border-top:1px solid var(--line)}
  .mail-top{display:flex;align-items:center;gap:7px;margin-bottom:3px}
  .who-tag{font-size:10.5px;font-weight:600;color:var(--muted);background:rgba(120,120,128,.09);padding:1px 7px;border-radius:6px;white-space:nowrap}
  .topic-tag{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);background:rgba(120,120,128,.06);padding:1px 7px;border-radius:6px}
  .mail .age{margin-left:auto;font-size:11px;color:var(--muted);white-space:nowrap}
  .mail .nudge{font-size:10px;font-weight:800;color:var(--orange);background:var(--orange-bg);padding:1px 7px;border-radius:6px}
  .mail-act{font-size:14px;color:var(--ink);font-weight:600;line-height:1.35;margin:1px 0}
  .mail-subj{display:block;font-size:12px;color:var(--muted);text-decoration:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
  .mail-subj:hover{color:var(--accent);text-decoration:underline}
  .mail-subj.main{color:var(--ink);font-size:13.5px;font-weight:600;white-space:normal}
  .mail-subj.main:hover{color:var(--accent)}
  /* tabs */
  .tabs{display:inline-flex;gap:2px;flex-wrap:wrap;margin-bottom:14px;background:rgba(120,120,128,.12);padding:3px;border-radius:12px}
  .tab-btn{border:0;background:transparent;color:var(--muted);font-size:12.5px;font-weight:600;padding:6px 13px;border-radius:9px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:background .15s,color .15s}
  .tab-btn b{font-weight:800;color:inherit}
  .tab-btn.active{background:var(--card);color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.12)}
  .tab-btn.active b{color:var(--ink)}
  .tab-panel[hidden]{display:none}
  /* collapse */
  .card-h{cursor:pointer;user-select:none}
  .caret{display:inline-block;color:var(--muted);font-size:10px;transition:transform .15s;margin-right:2px}
  .card:not(.collapsed) .caret{transform:rotate(90deg)}
  .card.collapsed .card-body{display:none}
  /* modal */
  #modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:60;padding:18px}
  #modal[hidden]{display:none!important}
  .modal-box{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:0 10px 40px rgba(0,0,0,.3);max-width:680px;width:100%;max-height:85vh;display:flex;flex-direction:column}
  .modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--line)}
  .modal-head button{border:0;background:transparent;color:var(--muted);font-size:18px;cursor:pointer;padding:4px 8px}
  #modalBody{margin:0;padding:16px;overflow:auto;white-space:pre-wrap;font:13px/1.55 ui-monospace,Menlo,monospace}
  /* ＋ captura — botão flutuante */
  .fab{position:fixed;right:max(18px,env(safe-area-inset-right));bottom:max(20px,env(safe-area-inset-bottom));z-index:40;width:56px;height:56px;border-radius:50%;border:0;background:var(--accent);color:#fff;font-size:30px;font-weight:300;line-height:0;cursor:pointer;box-shadow:0 6px 22px rgba(0,0,0,.24);display:flex;align-items:center;justify-content:center;transition:transform .14s ease}
  .fab[hidden]{display:none!important}
  .fab:hover{transform:scale(1.05)}
  .fab:active{transform:scale(.9)}
  .fab-q{position:absolute;top:-3px;right:-3px;min-width:19px;height:19px;padding:0 5px;border-radius:10px;background:var(--orange);color:#fff;font-size:11px;font-weight:800;line-height:19px;text-align:center;box-shadow:0 0 0 2px var(--bg)}
  /* captura — folha (bottom sheet) */
  #cap{position:fixed;inset:0;z-index:55;display:flex;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.4);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px)}
  #cap[hidden]{display:none!important}
  .cap-box{background:var(--card);width:100%;max-width:560px;border-radius:22px 22px 0 0;padding:10px 18px calc(18px + env(safe-area-inset-bottom));box-shadow:0 -10px 50px rgba(0,0,0,.3);animation:capUp .26s cubic-bezier(.32,.72,0,1)}
  @keyframes capUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .cap-grab{width:38px;height:5px;border-radius:3px;background:var(--line);margin:2px auto 12px}
  .cap-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .cap-title{font-size:15px;font-weight:700}
  .cap-head button{border:0;background:transparent;color:var(--muted);font-size:17px;cursor:pointer;padding:2px 6px}
  #capText{width:100%;border:1px solid var(--line);border-radius:14px;background:var(--bg);color:var(--ink);font:15px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;padding:12px 14px;resize:none;outline:none}
  #capText:focus{border-color:var(--accent)}
  .cap-foot{display:flex;align-items:center;justify-content:space-between;margin-top:12px}
  .cap-hint{font-size:11.5px;color:var(--muted)}
  .cap-go{border:0;border-radius:12px;background:var(--accent);color:#fff;font-size:14.5px;font-weight:700;padding:10px 20px;cursor:pointer;transition:transform .1s}
  .cap-go:active{transform:scale(.97)}
  @media(min-width:600px){ #cap{align-items:center} .cap-box{border-radius:22px;animation:capIn .2s ease} }
  @keyframes capIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
  /* toast */
  #toast{position:fixed;left:50%;transform:translateX(-50%) translateY(8px);bottom:92px;z-index:70;background:var(--ink);color:var(--card);padding:11px 20px;border-radius:22px;font-size:13.5px;font-weight:700;box-shadow:0 8px 28px rgba(0,0,0,.32);opacity:0;transition:opacity .25s,transform .25s;pointer-events:none}
  #toast[hidden]{display:none}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  /* capturas pendentes (aguardando triagem) */
  .cap-row{padding:8px 0;border-bottom:1px solid var(--line);display:flex;gap:9px;align-items:flex-start}
  .cap-row:last-child{border:0}
  .cap-ic{font-size:13px;opacity:.5;margin-top:2px}
  .cap-txt{flex:1;min-width:0;font-size:14px;line-height:1.4}
  .cap-meta{font-size:11px;color:var(--muted);margin-top:2px}
  @media (max-width:720px){
    .focus{grid-template-columns:1fr}
    .cols{grid-template-columns:1fr}
    .days{grid-template-columns:1fr}
    header.top h1{font-size:19px}
  }
</style>
</head>
<body>
<div id="gate" hidden>
  <div class="box">
    <h2>☀️ Orbital · Hoje</h2>
    <p>Cole o token de acesso (X-Orbital-Token). Fica salvo só neste aparelho.</p>
    <input id="tok" type="password" placeholder="token…" autocomplete="off" />
    <button id="btnEnter" type="button">Entrar</button>
    <div class="err" id="gateErr"></div>
  </div>
</div>

<div class="wrap" id="app" hidden>
  <header class="top">
    <div>
      <h1 id="dateLabel">Carregando…</h1>
      <div class="state" id="stateLine"></div>
    </div>
    <div class="meta">
      <div class="updated" id="updated"></div>
      <button class="refresh" id="btnBrief" type="button" title="Brief completo">📄 Brief</button>
      <button class="refresh" id="btnRefresh" type="button" title="Atualizar">⟳</button>
    </div>
  </header>
  <div id="content"></div>
</div>

<div id="modal" hidden>
  <div class="modal-box">
    <div class="modal-head"><strong>📄 Brief completo</strong><button id="btnCloseModal" type="button">✕</button></div>
    <pre id="modalBody"></pre>
  </div>
</div>

<button id="fab" class="fab" type="button" aria-label="Capturar" title="Capturar (n)" hidden>+<span id="fabQ" class="fab-q" hidden></span></button>

<div id="cap" hidden>
  <div class="cap-box">
    <div class="cap-grab"></div>
    <div class="cap-head"><span class="cap-title">Captura rápida</span><button id="capClose" type="button" aria-label="Fechar">✕</button></div>
    <textarea id="capText" rows="3" placeholder="O que surgiu? tarefa, ideia, recado, follow-up…"></textarea>
    <div class="cap-foot"><span class="cap-hint">⏎ envia · ⇧⏎ nova linha</span><button id="capSave" class="cap-go" type="button">Capturar</button></div>
  </div>
</div>

<div id="toast" hidden></div>

<script>
(function(){
  "use strict";
  var API="https://inspiragoglobal.com.br/api/orbital/all";
  var LS="orbital_token";
  function $(id){return document.getElementById(id);}
  function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c];});}
  // Remove invisíveis/não-ASCII que vêm do copiar-colar (NBSP, zero-width, aspas curvas, \n) — senão o fetch rejeita o header.
  function clean(s){return String(s==null?"":s).normalize("NFKC").replace(/[^\x21-\x7E]/g,"");}

  function getTok(){ try{return localStorage.getItem(LS);}catch(e){return window.__tok||null;} }
  function setTok(v){ try{localStorage.setItem(LS,v);}catch(e){window.__tok=v;} }
  function clrTok(){ try{localStorage.removeItem(LS);}catch(e){} window.__tok=null; }

  function ago(iso){
    if(!iso) return "";
    var d=(Date.now()-new Date(iso).getTime())/1000;
    if(d<90) return "agora";
    if(d<5400) return "há "+Math.round(d/60)+" min";
    if(d<172800) return "há "+Math.round(d/3600)+" h";
    return "há "+Math.round(d/86400)+" d";
  }

  function showGate(msg){
    $("app").hidden=true; $("gate").hidden=false;
    try{$("fab").hidden=true;}catch(e){}
    if(msg) $("gateErr").textContent=msg;
    try{$("tok").focus();}catch(e){}
  }

  function submitToken(){
    var v=clean($("tok").value);
    if(!v){ $("gateErr").textContent="Cole o token."; return; }
    setTok(v);
    $("gate").hidden=true;
    load();
  }

  function load(){
    var tok=getTok();
    if(!tok){ showGate(); return; }
    $("app").hidden=false;
    try{$("fab").hidden=false;}catch(e){}
    flushCap();
    $("content").innerHTML='<div class="empty">Carregando…</div>';
    fetch(API,{headers:{"X-Orbital-Token":clean(tok)}})
      .then(function(r){
        if(r.status===401){ clrTok(); showGate("Token inválido. Tente de novo."); return null; }
        if(!r.ok) throw new Error("HTTP "+r.status);
        return r.json();
      })
      .then(function(j){ if(j){ render(j.snapshot||{}); loadCaptures(); } })
      .catch(function(e){
        $("content").innerHTML='<div class="err-banner">Falha ao carregar: '+esc(e.message)+'. Toque em ⟳.</div>';
      });
  }

  var collapsed={};

  function slug(s){return String(s).replace(/[^\w]+/g,"-").toLowerCase();}

    var k=slug(title), cl=(collapsed[k]&&!forceOpen)?" collapsed":"";
    return '<div class="card'+cl+'" data-key="'+k+'"><h2 class="card-h"><span class="caret">▸</span>'+title+(right?'<span style="margin-left:auto">'+right+'</span>':'')+'</h2><div class="card-body">'+body+'</div></div>';
  }

  var lastBrief="", activeTab=null;
  try{ activeTab=localStorage.getItem("orbital_tab"); }catch(e){}
  function linkify(text,url){ return url?('<a class="lnk" href="'+esc(url)+'" target="_blank" rel="noopener">'+text+'</a>'):text; }
  function mailTags(who,topic){ return '<span class="who-tag">'+esc(who||"")+'</span>'+(topic?'<span class="topic-tag">'+esc(topic)+'</span>':''); }
  function mailSubj(x,main){ var t=esc(x.subject||""); return x.link?'<a class="mail-subj'+(main?' main':'')+'" href="'+esc(x.link)+'" target="_blank" rel="noopener">'+t+'</a>':'<span class="mail-subj'+(main?' main':'')+'">'+t+'</span>'; }
  function parseHM(s){ if(!s) return null; var m=/(\d{1,2}):(\d{2})/.exec(String(s)); return m?(+m[1])*60+(+m[2]):null; }
  function fmtDur(min){ var hh=Math.floor(min/60), mm=min%60; return (hh?hh+"h":"")+(mm?(hh?"":"")+mm+"min":""); }
  function pad2(n){ return (n<10?"0":"")+n; }
  function todayStr(){ var d=new Date(); return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate()); }
  function nowMin(){ var d=new Date(); return d.getHours()*60+d.getMinutes(); }
  // ✓ feito (local, zera por dia) — loop de fechamento/dopamina
  var doneKey="orbital_done_"+todayStr(), doneMap={};
  try{ doneMap=JSON.parse(localStorage.getItem(doneKey)||"{}"); }catch(e){}
  try{ for(var li=localStorage.length-1;li>=0;li--){ var lk=localStorage.key(li); if(/^orbital_done_/.test(lk)&&lk!==doneKey) localStorage.removeItem(lk); } }catch(e){}
  function dk(s){ return slug(String(s).slice(0,80)); }
  function chk(k){ return '<span class="chk" data-done="'+k+'"></span>'; }
  // dieta de saliência: flag vermelha só se for risco real
  function flagHtml(f){ var hot=/conflito|choca|prazo|zero buffer|overdue|vencid|urgente/i.test(f); return '<div class="flag'+(hot?' hot':'')+'">'+(hot?'⚠️ ':'')+esc(f)+'</div>'; }
  function evBlock(e,hpx,startTxt,xcls){
    var ti=e.link?('<a class="evlnk" href="'+esc(e.link)+'" target="_blank" rel="noopener">'+esc(e.title||"")+'</a>'):esc(e.title||"");

      ((e.participants&&e.participants.length)?'<div class="p">'+esc(e.participants.join(", "))+'</div>':'')+
      ((e.flags&&e.flags.length)?e.flags.map(flagHtml).join(""):'')+'</div>';
  }
  function renderDay(day){
    var WSTART=8*60, WEND=19*60, SLOT=30, PX=26;
    var raw=(day.events||[]).map(function(e){ var st=parseHM(e.start||e.time), en=parseHM(e.end); return {e:e,st:st,dur:(st!=null&&en!=null&&en>st)?en-st:60}; });
    var timed=raw.filter(function(x){return x.st!=null;}).sort(function(a,b){return a.st-b.st;});
    var untimed=raw.filter(function(x){return x.st==null;});
    if(!raw.length) return '<div class="day"><h3>'+esc(day.label||day.date||"")+'</h3><div class="freeday">livre o dia todo</div></div>';
    function free(a,z){ if(z-a<SLOT) return ""; var n=Math.round((z-a)/SLOT); return '<div class="free">🟢 '+n+(n>1?" slots":" slot")+' livre'+(n>1?"s":"")+' · '+fmtDur(z-a)+'</div>'; }
    var isToday=(day.date===todayStr()), nm=nowMin(), nowDrawn=!isToday;
    var html="", cur=Math.min(WSTART, timed.length?timed[0].st:WSTART);
    if(timed.length){
      html+=free(cur, timed[0].st); cur=timed[0].st;
      timed.forEach(function(x){
        if(x.st>cur) html+=free(cur,x.st);
        if(!nowDrawn&&x.st>nm){ html+='<div class="nowline"></div>'; nowDrawn=true; }
        var hpx=Math.min(220,Math.max(42,Math.round(x.dur/SLOT)*PX));
        var past=isToday&&(x.st+x.dur)<=nm;
        html+=evBlock(x.e,hpx, x.e.start||x.e.time||"", past?"past":"");
        cur=Math.max(cur, x.st+x.dur);
      });
      if(!nowDrawn&&nm>cur){ html+='<div class="nowline"></div>'; nowDrawn=true; }
      if(cur<WEND) html+=free(cur,WEND);
    }
    if(untimed.length) html+=untimed.map(function(x){return evBlock(x.e,34,"dia todo");}).join("");
    return '<div class="day"><h3>'+esc(day.label||day.date||"")+'</h3>'+html+'</div>';
  }

  function render(s){
    window.__snap=s;

      var nm=nowMin();
      var evs=((dayObj&&dayObj.events)||[]).map(function(e){ var st=parseHM(e.start||e.time), en=parseHM(e.end);

        .filter(function(x){return x.st!=null;}).sort(function(a,b2){return a.st-b2.st;});
      var cur=null,nxt=null;
      evs.forEach(function(x){ if(x.st<=nm&&nm<x.en&&!cur) cur=x; if(x.st>nm&&!nxt) nxt=x; });

         (cd?'<span class="cd">'+esc(cd)+'</span>':'')+

    if(Array.isArray(b.focus_today)&&b.focus_today.length){

        '<div class="focus">'+b.focus_today.map(function(f,i){var k=dk("f-"+f),dn=doneMap[k];return '<div class="f'+(dn?' done-item':'')+'">'+chk(k)+'<span class="n">'+(i+1)+'</span><span>'+esc(f)+'</span></div>';}).join("")+'</div>');

          return '<div class="mail"><div class="mail-top">'+mailTags("p/ "+(x.to||""),x.topic)+meta+'</div>'+mailSubj(x,true)+'</div>';
        }).join("")});

    if(ib){
      var nr=(ib.respond||[]).length, nu=(ib.unread||[]).length, cbody="";
      if(nr){ cbody+='<div class="lane"><div class="lane-h" style="color:var(--red)">🔴 Sua vez — responder</div>'+
        ib.respond.map(function(x){
          return '<div class="mail"><div class="mail-top">'+mailTags(x.from,x.topic)+(x.age?'<span class="age">'+esc(x.age)+'</span>':'')+'</div>'+
            (x.action?'<div class="mail-act">'+esc(x.action)+'</div>':'')+mailSubj(x,!x.action)+'</div>';
        }).join("")+'</div>'; }
      if(nu){ cbody+='<div class="lane"><div class="lane-h" style="color:var(--muted)">📬 Não lidas relevantes</div>'+
        ib.unread.map(function(x){ return '<div class="mail"><div class="mail-top">'+mailTags(x.from,x.topic)+'</div>'+mailSubj(x,true)+'</div>'; }).join("")+'</div>'; }
      if(ib.rest_count) cbody+='<div class="rest">⚪ resto: '+esc(ib.rest_count)+' (FYI / ruído)</div>';
      if(nr||nu||ib.rest_count) tabs.push({key:"caixa",label:"📧 Caixa",n:(nr+nu)||null,html:cbody});
    } else if(Array.isArray(b.email)&&b.email.length){
      tabs.push({key:"caixa",label:"📧 Email",n:b.email.length,html:
        b.email.map(function(x){ var dotc=x.level==="red"?"🔴":(x.level==="yellow"?"🟡":"⚪");
          return '<div class="row"><div class="ti">'+linkify('<span class="dot">'+dotc+'</span>'+(x.from?'<b>'+esc(x.from)+'</b> — ':'')+esc(x.subject||""),x.link)+'</div>'+(x.action?'<div class="why">'+esc(x.action)+'</div>':'')+'</div>'; }).join("")});

      var panels=tabs.map(function(tb){ return '<div class="tab-panel" data-panel="'+tb.key+'"'+(tb.key===act?"":" hidden")+'>'+tb.html+'</div>'; }).join("");
      h+=card("📥 Central","",'<div class="tabs">'+bar+'</div>'+panels,hasUrg);

    // 📅 Agenda full-width — altura do evento ∝ duração + slots livres sintéticos

    (t.overdue||[]).forEach(function(x){tk+=tkRow("overdue","over",x.title,x.link,x.since?"desde "+esc(x.since):"");});
    (t.cold_followups||[]).forEach(function(x){tk+=tkRow("followup "+(x.days!=null?x.days+"d":""),"fu",x.name,x.link,x.context?esc(x.context):"");});

  $("content").addEventListener("click",function(e){

  });
  // ───── Captura manual: porta de entrada do humano ─────
  // Item cai numa fila local (localStorage) e é POSTado pro backend. Se o endpoint
  // ainda não existe (ou está offline), fica na fila e reenvia sozinho no próximo load.
  var CAP_API="https://inspiragoglobal.com.br/api/orbital/capture";
  var CAP_LIST_API="https://inspiragoglobal.com.br/api/orbital/captures?status=pending";
  var CAPQ="orbital_capture_queue";
  function readQ(){ try{return JSON.parse(localStorage.getItem(CAPQ)||"[]");}catch(e){return [];} }
  function writeQ(q){ try{localStorage.setItem(CAPQ,JSON.stringify(q));}catch(e){} }
  function capId(){ return "c"+Date.now()+"-"+Math.floor(Math.random()*1e6); }
  function updFab(){ var n=readQ().length, b=$("fabQ"); if(!b)return; if(n>0){ b.textContent=n; b.hidden=false; } else b.hidden=true; }
  // capturas a exibir = fila local (ainda enviando) + pendentes no backend (aguardando triagem), sem duplicar
  function capsForDisplay(){
    var local=readQ(), remote=window.__pendingCaps||[], seen={}, out=[];
    local.forEach(function(x){ seen[x.id]=1; out.push({text:x.text,capturedAt:x.capturedAt,state:"sending"}); });
    remote.forEach(function(x){ if(seen[x.id])return; out.push({text:x.text,capturedAt:x.capturedAt||x.captured_at,state:"pending"}); });
    return out;
  }
  function loadCaptures(){
    var tok=getTok(); if(!tok) return;
    fetch(CAP_LIST_API,{headers:{"X-Orbital-Token":clean(tok)}})
      .then(function(r){ return r.ok?r.json():null; })
      .then(function(j){ if(j&&j.captures){ window.__pendingCaps=j.captures; if(window.__snap) render(window.__snap); } })
      .catch(function(){});
  }
  function flushCap(){
    var q=readQ(), tok=getTok();
    if(!q.length||!tok){ updFab(); return; }
    var item=q[0];
    fetch(CAP_API,{method:"POST",headers:{"Content-Type":"application/json","X-Orbital-Token":clean(tok)},body:JSON.stringify(item)})
      .then(function(r){
        if(!r.ok){ updFab(); return; }  // 4xx/5xx — mantém na fila
        // 200 só conta se vier JSON com ok:true. HTML 200 (rota inexistente) NÃO limpa a fila —
        // senão a captura evapora silenciosamente. Mantém na fila e o badge avisa.
        return r.json().then(function(j){
          if(j&&j.ok){ writeQ(readQ().filter(function(x){return x.id!==item.id;})); updFab(); loadCaptures(); flushCap(); }
          else updFab();
        },function(){ updFab(); });  // corpo não-JSON → mantém na fila
      })
      .catch(function(){ updFab(); });  // offline — mantém na fila
  }
  function toast(msg){
    var t=$("toast"); if(!t)return; t.textContent=msg; t.hidden=false;
    requestAnimationFrame(function(){ t.classList.add("show"); });
    clearTimeout(window.__toastT);
    window.__toastT=setTimeout(function(){ t.classList.remove("show"); setTimeout(function(){t.hidden=true;},250); },1800);
  }
  function openCap(){ $("cap").hidden=false; var ta=$("capText"); ta.value=""; setTimeout(function(){try{ta.focus();}catch(e){}},30); }
  function closeCap(){ $("cap").hidden=true; }
  function saveCap(){
    var ta=$("capText"), txt=(ta.value||"").trim();
    if(!txt){ closeCap(); return; }
    var q=readQ(); q.push({id:capId(),text:txt,capturedAt:new Date().toISOString(),source:"manual"}); writeQ(q);
    closeCap(); updFab(); if(window.__snap) render(window.__snap); toast(getTok()?"✓ Capturado":"✓ Salvo (entra ao logar)"); flushCap();
  }
  $("fab").addEventListener("click",openCap);
  $("capSave").addEventListener("click",saveCap);
  $("capClose").addEventListener("click",closeCap);
  $("cap").addEventListener("click",function(e){ if(e.target===$("cap")) closeCap(); });
  $("capText").addEventListener("keydown",function(e){
    if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); saveCap(); }
    else if(e.key==="Escape"){ closeCap(); }
  });
  document.addEventListener("keydown",function(e){
    var tag=(e.target&&e.target.tagName)||"";
    if((e.key==="n"||e.key==="N")&&!/^(INPUT|TEXTAREA)$/.test(tag)&&$("cap").hidden&&$("gate").hidden){ e.preventDefault(); openCap(); }

  updFab();

  $("btnBrief").addEventListener("click",function(){ $("modalBody").textContent=lastBrief||"(sem brief)"; $("modal").hidden=false; });
  $("btnCloseModal").addEventListener("click",function(){ $("modal").hidden=true; });
  $("modal").addEventListener("click",function(e){ if(e.target===$("modal")) $("modal").hidden=true; });
  $("btnEnter").addEventListener("click",submitToken);
  $("tok").addEventListener("keydown",function(e){ if(e.key==="Enter") submitToken(); });
  $("btnRefresh").addEventListener("click",load);
  // contagem regressiva do AGORA + linha do agora se atualizam a cada minuto
  setInterval(function(){ if(window.__snap&&!document.hidden) render(window.__snap); },60000);
  load();
})();
</script>
</body>
</html>
